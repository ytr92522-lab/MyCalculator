<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Calculator Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#141E30,#243B55);
}

.calculator{
    width:360px;
    background:#1e293b;
    border-radius:25px;
    padding:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.5);
}

#display{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    border-radius:15px;
    background:#0f172a;
    color:#fff;
    text-align:right;
    font-size:34px;
    padding:20px;
    margin-bottom:20px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    height:65px;
    border:none;
    border-radius:15px;
    font-size:24px;
    cursor:pointer;
    transition:.2s;
}

button:active{
    transform:scale(.95);
}

.num{
    background:#334155;
    color:white;
}

.op{
    background:#f97316;
    color:white;
}

.equal{
    background:#22c55e;
    color:white;
}

.clear{
    background:#ef4444;
    color:white;
}
</style></head>
<body>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="op" onclick="backspace()">⌫</button>
<button class="op" onclick="append('%')">%</button>
<button class="op" onclick="append('÷')">÷</button>

<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="op" onclick="append('×')">×</button>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="op" onclick="append('-')">−</button>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="op" onclick="append('+')">+</button>

<button class="num" onclick="toggleSign()">+/-</button>
<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>
</div><script>
const display = document.getElementById("display");

function append(value){
  display.value += value;
}

function clearDisplay(){
  display.value = "";
}

function backspace(){
  display.value = display.value.slice(0,-1);
}

function toggleSign(){
  if(display.value.startsWith("-")){
    display.value = display.value.substring(1);
  }else if(display.value !== ""){
    display.value = "-" + display.value;
  }
}

function calculate(){
  try{
    let exp = display.value
      .replace(/×/g,"*")
      .replace(/÷/g,"/");

    display.value = eval(exp);
  }catch(e){
    display.value = "Error";
  }
}
</script>

</body>
</html>
