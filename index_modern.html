<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.calculator{
    width:340px;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,.4);
}
#display{
    width:100%;
    height:70px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    font-size:30px;
    text-align:right;
    padding:15px;
    background:#334155;
    color:white;
}
.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}
button{
    height:60px;
    border:none;
    border-radius:12px;
    font-size:22px;
    cursor:pointer;
}
.operator{
    background:#f97316;
    color:white;
}
.number{
    background:#475569;
    color:white;
}
.equal{
    background:#22c55e;
    color:white;
}
.clear{
    background:#ef4444;
    color:white;
}
</style>
</head>

<body>

<div class="calculator">
<input type="text" id="display" readonly>

<div class="buttons">
<button class="clear" onclick="clr()">C</button>
<button class="operator" onclick="add('/')">/</button>
<button class="operator" onclick="add('*')">*</button>
<button class="operator" onclick="add('-')">-</button>

<button class="number" onclick="add('7')">7</button>
<button class="number" onclick="add('8')">8</button>
<button class="number" onclick="add('9')">9</button>
<button class="operator" onclick="add('+')">+</button>

<button class="number" onclick="add('4')">4</button>
<button class="number" onclick="add('5')">5</button>
<button class="number" onclick="add('6')">6</button>
<button class="equal" onclick="calculate()" rowspan="2">=</button>

<button class="number" onclick="add('1')">1</button>
<button class="number" onclick="add('2')">2</button>
<button class="number" onclick="add('3')">3</button>

<button class="number" onclick="add('0')">0</button>
<button class="number" onclick="add('.')">.</button>
</div>

</div>

<script>
let display=document.getElementById("display");

function add(value){
display.value+=value;
}

function clr(){
display.value="";
}

function calculate(){
try{
display.value=eval(display.value);
}catch{
display.value="Error";
}
}
</script>

</body>
</html>
